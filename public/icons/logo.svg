<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Mi Gym">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14141e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Pesa de barra (barbell) estilizada, centrada -->
  <g transform="translate(256 256)">
    <!-- Barra central -->
    <rect x="-150" y="-14" width="300" height="28" rx="14" fill="url(#fg)"/>
    <!-- Disco izquierdo grande -->
    <rect x="-180" y="-78" width="40" height="156" rx="10" fill="url(#fg)"/>
    <!-- Disco izquierdo pequeño -->
    <rect x="-138" y="-58" width="24" height="116" rx="8" fill="url(#fg)" opacity="0.85"/>
    <!-- Disco derecho grande -->
    <rect x="140" y="-78" width="40" height="156" rx="10" fill="url(#fg)"/>
    <!-- Disco derecho pequeño -->
    <rect x="114" y="-58" width="24" height="116" rx="8" fill="url(#fg)" opacity="0.85"/>
  </g>
</svg>
